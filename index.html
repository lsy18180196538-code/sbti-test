<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBTI 人格测试 | 你是哪种人？</title>
<style>
  :root {
    --primary: #7c3aed;
    --secondary: #ec4899;
    --accent: #06b6d4;
    --bg: #0f0a1e;
    --card: #1a1030;
    --text: #f0e6ff;
    --muted: #9b8db0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景动态粒子 */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(6,182,212,0.08) 0%, transparent 60%);
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* ===================== 欢迎页 ===================== */
  #page-intro {
    text-align: center;
    padding-top: 40px;
  }

  .logo-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 6px 18px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    margin-bottom: 24px;
    box-shadow: 0 0 30px rgba(236,72,153,0.4);
  }

  .intro-title {
    font-size: clamp(42px, 10vw, 72px);
    font-weight: 900;
    background: linear-gradient(135deg, #c084fc, #f472b6, #67e8f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .intro-subtitle {
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .intro-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 420px;
    margin: 0 auto 40px;
  }

  .intro-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 40px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
  }

  .btn-start {
    display: inline-block;
    padding: 18px 56px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    border-radius: 99px;
    font-size: 18px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 40px rgba(124,58,237,0.5);
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .btn-start:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 50px rgba(124,58,237,0.7);
  }

  .btn-start:active { transform: translateY(0); }

  .type-preview {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 48px;
  }

  .type-chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 12px;
    color: var(--muted);
  }

  /* ===================== 测试页 ===================== */
  #page-test { display: none; }

  .progress-bar-wrap {
    margin-bottom: 32px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .dim-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .question-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 32px 28px 28px;
    margin-bottom: 20px;
    transition: all 0.4s;
    box-shadow: 0 4px 40px rgba(0,0,0,0.3);
  }

  .question-num {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .question-text {
    font-size: clamp(17px, 4vw, 21px);
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 20px;
    text-align: left;
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.25s;
    line-height: 1.5;
  }

  .option-btn:hover {
    background: rgba(124,58,237,0.15);
    border-color: var(--primary);
    transform: translateX(4px);
  }

  .option-btn.selected {
    background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(236,72,153,0.2));
    border-color: var(--secondary);
    box-shadow: 0 0 20px rgba(236,72,153,0.2);
  }

  .option-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    margin-right: 10px;
    letter-spacing: 0.5px;
  }

  .nav-btns {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
    gap: 12px;
  }

  .btn-nav {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-prev {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
  }

  .btn-prev:hover { background: rgba(255,255,255,0.1); }

  .btn-next {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }

  .btn-next:hover { box-shadow: 0 6px 30px rgba(124,58,237,0.6); transform: translateY(-1px); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ===================== 结果页 ===================== */
  #page-result { display: none; }

  .result-header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 20px;
  }

  .result-type-label {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .result-type-code {
    font-size: clamp(56px, 14vw, 80px);
    font-weight: 900;
    background: linear-gradient(135deg, #c084fc, #f472b6, #67e8f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    letter-spacing: 4px;
  }

  .result-type-name {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 800;
    margin-top: 8px;
    margin-bottom: 4px;
  }

  .result-type-en {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 0;
  }

  .result-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 28px;
    margin-bottom: 16px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.3);
  }

  .result-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .result-desc {
    font-size: 15px;
    line-height: 1.9;
    color: rgba(240,230,255,0.9);
  }

  .traits-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }

  .trait-item {
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.5;
  }

  .trait-icon { font-size: 18px; display: block; margin-bottom: 4px; }

  .dim-bars { display: flex; flex-direction: column; gap: 14px; }

  .dim-bar-row { }

  .dim-bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
    color: var(--muted);
  }

  .dim-bar-labels span:first-child { color: var(--text); font-weight: 600; }

  .dim-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    overflow: hidden;
  }

  .dim-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }

  .famous-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .famous-chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 13px;
  }

  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
  }

  .btn-share {
    width: 100%;
    padding: 18px;
    border-radius: 99px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .btn-copy {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 8px 30px rgba(124,58,237,0.4);
  }

  .btn-copy:hover { box-shadow: 0 12px 40px rgba(124,58,237,0.6); transform: translateY(-2px); }

  .btn-retry {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-retry:hover { background: rgba(255,255,255,0.1); }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(124,58,237,0.95);
    color: white;
    padding: 12px 28px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 动画 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-up {
    animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* 滚动条美化 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 99px; }

  @media (max-width: 400px) {
    .intro-stats { gap: 20px; }
    .question-card { padding: 24px 20px; }
    .traits-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">

  <!-- ===== 欢迎页 ===== -->
  <div id="page-intro" class="fade-up">
    <div class="logo-badge">✦ SBTI · 人格测试</div>
    <h1 class="intro-title">SBTI</h1>
    <p class="intro-subtitle">你真正是哪种人？</p>
    <p class="intro-desc">
      基于社交行为、决策模式、思维方式与情绪感知<br>
      24道题 · 科学分析 · 精准定位你的人格类型
    </p>
    <div class="intro-stats">
      <div class="stat-item">
        <div class="stat-num">16</div>
        <div class="stat-label">人格类型</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">24</div>
        <div class="stat-label">测试题目</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">3min</div>
        <div class="stat-label">完成时间</div>
      </div>
    </div>
    <button class="btn-start" onclick="startTest()">开始测试 →</button>
    <div class="type-preview">
      <span class="type-chip">🦋 社牛探险家</span>
      <span class="type-chip">🌙 独行思考者</span>
      <span class="type-chip">🔥 冲劲实干家</span>
      <span class="type-chip">🌊 感性艺术魂</span>
      <span class="type-chip">⚡ 理性策略师</span>
      <span class="type-chip">🌸 温暖治愈系</span>
      <span class="type-chip">🎯 冷静掌控者</span>
      <span class="type-chip">🌈 自由飞翔派</span>
    </div>
  </div>

  <!-- ===== 测试页 ===== -->
  <div id="page-test">
    <div class="progress-bar-wrap">
      <div class="progress-info">
        <span id="q-counter">第 1 题 / 共 24 题</span>
        <span id="q-dim-label">社交维度</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="question-num" id="q-num"></div>
      <div class="question-text" id="q-text"></div>
      <div class="options-grid" id="options-grid"></div>
    </div>

    <div class="nav-btns">
      <button class="btn-nav btn-prev" onclick="prevQ()">← 上一题</button>
      <button class="btn-nav btn-next" id="btn-next" onclick="nextQ()" disabled>下一题 →</button>
    </div>
  </div>

  <!-- ===== 结果页 ===== -->
  <div id="page-result">
    <div class="result-header fade-up">
      <div class="result-type-label">你的 SBTI 人格类型</div>
      <div class="result-type-code" id="res-code"></div>
      <div class="result-type-name" id="res-name"></div>
      <div class="result-type-en" id="res-en"></div>
    </div>

    <div class="result-card fade-up" style="animation-delay:0.1s">
      <div class="result-card-title">📋 人格解读</div>
      <div class="result-desc" id="res-desc"></div>
    </div>

    <div class="result-card fade-up" style="animation-delay:0.15s">
      <div class="result-card-title">✨ 核心特质</div>
      <div class="traits-grid" id="res-traits"></div>
    </div>

    <div class="result-card fade-up" style="animation-delay:0.2s">
      <div class="result-card-title">📊 维度分析</div>
      <div class="dim-bars" id="res-bars"></div>
    </div>

    <div class="result-card fade-up" style="animation-delay:0.25s">
      <div class="result-card-title">🌟 同类型代表人物</div>
      <div class="famous-list" id="res-famous"></div>
    </div>

    <div class="result-actions fade-up" style="animation-delay:0.3s">
      <button class="btn-share btn-copy" onclick="copyResult()">📋 复制结果去分享</button>
      <button class="btn-share btn-retry" onclick="retryTest()">🔄 重新测试</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===================== 题目数据 =====================
const questions = [
  // 维度 S/I (社交 Social vs 独处 Introvert)
  { dim: 'SI', direction: 'S', dimName: '社交维度',
    text: '周五晚上突然有朋友说"要不要出来聚聚"，你的第一反应是？',
    options: [
      { text: '哇太好了！立刻换衣服出门那种', score: 4 },
      { text: '还行吧，想想看去不去', score: 3 },
      { text: '有点想去但也有点累……', score: 2 },
      { text: '在家躺着不好吗，谢谢再联系', score: 1 }
    ]
  },
  { dim: 'SI', direction: 'S', dimName: '社交维度',
    text: '在一个认识的人很少的聚会上，你通常会？',
    options: [
      { text: '主动找人聊，不认识正好交新朋友', score: 4 },
      { text: '找到一个人聊深了就够了', score: 3 },
      { text: '基本待在角落等熟人来找我', score: 2 },
      { text: '想找个理由提前离开', score: 1 }
    ]
  },
  { dim: 'SI', direction: 'S', dimName: '社交维度',
    text: '一个人独处一整天之后，你感觉？',
    options: [
      { text: '有点憋，想找人说说话', score: 4 },
      { text: '还好，但后面想出去转转', score: 3 },
      { text: '挺爽的，偶尔这样不错', score: 2 },
      { text: '完美，我可以这样过一辈子', score: 1 }
    ]
  },
  { dim: 'SI', direction: 'S', dimName: '社交维度',
    text: '在群里发了一条消息结果没人回，你会？',
    options: [
      { text: '继续刷存在感，@人', score: 4 },
      { text: '撤了重发或补充一条', score: 3 },
      { text: '尴尬但装作没事', score: 2 },
      { text: '沉默，感觉没必要发', score: 1 }
    ]
  },
  { dim: 'SI', direction: 'S', dimName: '社交维度',
    text: '你在公共场合的状态通常是？',
    options: [
      { text: '状态爆炸，能量加倍充电', score: 4 },
      { text: '还行，取决于身边的人', score: 3 },
      { text: '有点消耗，回家才能缓', score: 2 },
      { text: '默默观察，尽量少说话', score: 1 }
    ]
  },
  { dim: 'SI', direction: 'S', dimName: '社交维度',
    text: '下班/放学后，你最想做的事？',
    options: [
      { text: '找朋友吃饭聊天', score: 4 },
      { text: '看看有没有人约，没有就在家', score: 3 },
      { text: '一个人听歌散步', score: 2 },
      { text: '回家躺着，谁都不想见', score: 1 }
    ]
  },

  // 维度 B/T (冲劲 Bold vs 稳重 Thoughtful)
  { dim: 'BT', direction: 'B', dimName: '决策维度',
    text: '朋友突然说"走，明天去XX旅游"，你的反应？',
    options: [
      { text: '好啊！说走就走，收拾东西了', score: 4 },
      { text: '有点心动，问问细节', score: 3 },
      { text: '考虑一下，看看情况', score: 2 },
      { text: '这么突然……我得提前规划好才行', score: 1 }
    ]
  },
  { dim: 'BT', direction: 'B', dimName: '决策维度',
    text: '买东西的时候你通常？',
    options: [
      { text: '喜欢就下单，过了手感就没了', score: 4 },
      { text: '想想觉得可以就买', score: 3 },
      { text: '收藏好，过几天看看还想不想要', score: 2 },
      { text: '比价、看测评、问朋友，确认值才买', score: 1 }
    ]
  },
  { dim: 'BT', direction: 'B', dimName: '决策维度',
    text: '遇到有人不尊重你，你会？',
    options: [
      { text: '当场就怼回去，忍不住', score: 4 },
      { text: '当时可能不说，但事后会处理', score: 3 },
      { text: '内心翻涌，表面平静', score: 2 },
      { text: '想想算了，不值得浪费时间', score: 1 }
    ]
  },
  { dim: 'BT', direction: 'B', dimName: '决策维度',
    text: '你制定计划的方式是？',
    options: [
      { text: '什么计划，走一步看一步', score: 4 },
      { text: '大概想一下，细节随机应变', score: 3 },
      { text: '简单列个清单', score: 2 },
      { text: '详细规划，备用方案都想好', score: 1 }
    ]
  },
  { dim: 'BT', direction: 'B', dimName: '决策维度',
    text: '你对待新事物的态度是？',
    options: [
      { text: '第一个冲，不试怎么知道', score: 4 },
      { text: '看起来有意思就尝试', score: 3 },
      { text: '等别人试了我再考虑', score: 2 },
      { text: '习惯的东西不想换，新的不一定好', score: 1 }
    ]
  },
  { dim: 'BT', direction: 'B', dimName: '决策维度',

// ===================== 测试逻辑 =====================
let currentQ = 0;
let answers = new Array(questions.length).fill(null);
let scores = { SI: 0, BT: 0, TF: 0, JP: 0 };

function startTest() {
  document.getElementById('page-intro').style.display = 'none';
  document.getElementById('page-test').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `第 ${currentQ + 1} 题 / 共 ${questions.length} 题`;
  document.getElementById('q-dim-label').textContent = q.dimName;
  document.getElementById('q-num').textContent = `Q${currentQ + 1}`;
  document.getElementById('q-text').textContent = q.text;

  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-label">${labels[i]}</span>${opt.text}`;
    btn.onclick = () => selectOption(i);
    grid.appendChild(btn);
  });

  document.getElementById('btn-next').disabled = answers[currentQ] === null;
  document.getElementById('btn-next').textContent = currentQ === questions.length - 1 ? '查看结果 ✨' : '下一题 →';
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (answers[currentQ] === null) return;
  if (currentQ === questions.length - 1) {
    calcResult();
    return;
  }
  currentQ++;
  renderQuestion();
  document.querySelector('.question-card').classList.remove('fade-up');
  void document.querySelector('.question-card').offsetWidth;
  document.querySelector('.question-card').classList.add('fade-up');
}

function prevQ() {
  if (currentQ === 0) return;
  currentQ--;
  renderQuestion();
}

function calcResult() {
  // 重置分数
  scores = { SI: 0, BT: 0, TF: 0, JP: 0 };

  questions.forEach((q, i) => {
    if (answers[i] !== null) {
      scores[q.dim] += questions[i].options[answers[i]].score;
    }
  });

  // 每维度满分 4*6=24，中间值12
  const dimResult = {
    SI: scores.SI >= 13 ? 'S' : 'I',
    BT: scores.BT >= 13 ? 'B' : 'T',
    TF: scores.TF >= 13 ? 'T' : 'F',  // T高分=理性
    JP: scores.JP >= 13 ? 'J' : 'P'
  };

  const typeCode = dimResult.SI + dimResult.BT + dimResult.TF + dimResult.JP;

  // fallback
  const p = personalities[typeCode] || personalities['SFFP'];

  showResult(typeCode, p, dimResult, scores);
}

function showResult(code, p, dimResult, scores) {
  document.getElementById('page-test').style.display = 'none';
  document.getElementById('page-result').style.display = 'block';
  window.scrollTo(0, 0);

  document.getElementById('res-code').textContent = code;
  document.getElementById('res-name').textContent = p.emoji + ' ' + p.name;
  document.getElementById('res-en').textContent = p.en;
  document.getElementById('res-desc').textContent = p.desc;

  // 特质
  const traitsEl = document.getElementById('res-traits');
  traitsEl.innerHTML = p.traits.map(t =>
    `<div class="trait-item"><span class="trait-icon">${t.icon}</span>${t.text}</div>`
  ).join('');

  // 维度条
  const barsEl = document.getElementById('res-bars');
  const dims = [
    { label1: 'S 社牛', label2: 'I 独处', score: scores.SI, max: 24 },
    { label1: 'B 冲劲', label2: 'T 稳重', score: scores.BT, max: 24 },
    { label1: 'T 理性', label2: 'F 感性', score: scores.TF, max: 24 },
    { label1: 'J 计划', label2: 'P 随性', score: scores.JP, max: 24 },
  ];
  const barColors = [
    ['#7c3aed', '#ec4899'],
    ['#f59e0b', '#ef4444'],
    ['#0891b2', '#7c3aed'],
    ['#059669', '#06b6d4'],
  ];
  barsEl.innerHTML = dims.map((d, i) => {
    const pct = Math.round((d.score / d.max) * 100);
    return `
      <div class="dim-bar-row">
        <div class="dim-bar-labels">
          <span>${d.label1} ${pct}%</span>
          <span>${d.label2} ${100-pct}%</span>
        </div>
        <div class="dim-bar-track">
          <div class="dim-bar-fill" style="width:0%;background:linear-gradient(90deg,${barColors[i][0]},${barColors[i][1]})" data-pct="${pct}"></div>
        </div>
      </div>
    `;
  }).join('');

  // 名人
  document.getElementById('res-famous').innerHTML = p.famous.map(f =>
    `<span class="famous-chip">${f}</span>`
  ).join('');

  // 动画延迟后启动进度条
  setTimeout(() => {
    document.querySelectorAll('.dim-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 300);

  // 存入全局供分享
  window._resultCode = code;
  window._resultName = p.name;
  window._resultDesc = p.desc;
}

function copyResult() {
  const text = `🎯 我的 SBTI 人格类型是【${window._resultCode} · ${window._resultName}】\n\n${window._resultDesc}\n\n✨ 快去测测你是什么类型 → ${window.location.href}`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制！快去发到你的评论区~'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 已复制！快去发到你的评论区~');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function retryTest() {
  currentQ = 0;
  answers = new Array(questions.length).fill(null);
  scores = { SI: 0, BT: 0, TF: 0, JP: 0 };
  document.getElementById('page-result').style.display = 'none';
  document.getElementById('page-intro').style.display = 'block';
  window.scrollTo(0, 0);
}
</script>
